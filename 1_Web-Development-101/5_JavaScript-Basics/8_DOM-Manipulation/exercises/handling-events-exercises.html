<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>EloquentJS Handling Events Exercises</title>
    <style>
        p {
            font-size: 10px;
        }

        /*Mouse Trail*/
        .trail { /* className for the trail elements */
            position: absolute;
            height: 6px; width: 6px;
            border-radius: 3px;
            background: teal;
        }

        body {
            height: 300px;
        }
    </style>
</head>
<body>
<!--//                       Balloon                    -->
<p>🎈</p>
<div id="outerDiv"></div>
<script>
    //                  Balloon
    let balloon = document.querySelector("p");
    let size = 30;
    window.addEventListener("keydown", event => {
        switch (true) {
            case event.key == "ArrowUp":
                size += 10;
                balloon.style.fontSize = size + "px";
                event.preventDefault();
                break;
            case event.key == "ArrowDown":
                size -= 10;
                balloon.style.fontSize = size + "px";
                event.preventDefault();
                break;
        }

    if (size >= 150) {
        balloon.textContent = "💥";
    }
    });




    //                      Mouse Trail

    let mouseMoving = null;
    let stopTrail;
    let trailNodes = document.body.children;

    window.addEventListener("mousemove", event => {
        clearTimeout(stopTrail);

        let trail = document.createElement("div");
        let trailNodes = document.body.children;

        trail.className = "trail";
        trail.style.left = (event.pageX) + "px";
        trail.style.top = (event.pageY) + "px";
        document.body.appendChild(trail);

        setTimeout(removeTail(trailNodes[0]), 5000);

        if (!mouseMoving) {
            let tail = document.getElementsByClassName("trail");
            stopTrail = setTimeout(() => {
                for (let i = 0; i < tail.length-1; i++) {
                    tail[i].remove();
                }

                tail[0].remove();
                mouseMoving = null;
            }, 250);
        }

        function removeTail(node) {
            node.remove();
        }

        mouseMoving = event;
    });

</script>
</body>
</html>
